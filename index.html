<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>Birdlife — Simulation d'oiseaux</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="top">
      <div class="stat" title="Énergie totale collectée par les oiseaux">
        <span class="icon">◈</span>
        <span id="xp">0</span>
        <small>essence</small>
      </div>
      <div class="stat" title="Oiseaux vivants">
        <span class="icon">✦</span>
        <span id="birdCount">0</span>
        <small>oiseaux</small>
      </div>
      <div class="stat" title="Niveau du monde">
        <span class="icon">▲</span>
        <span id="worldLvl">1</span>
        <small>monde</small>
      </div>
      <button id="regenBtn" title="Régénérer un nouveau monde procédural">Nouveau monde</button>
      <button id="resetBtn" title="Tout réinitialiser">Reset</button>
    </div>

    <div class="bottom">
      <div id="foodbar"></div>
      <div id="tip">
        <span class="desktop-only">
          <b>Clic-glisser</b> pour regarder, <b>WASD</b> se déplacer,
          <b>Shift</b> courir, <b>Espace</b> sauter, <b>clic</b> nourrir,
          <b>1–5</b> choisir la nourriture.
        </span>
        <span class="touch-only">
          Joystick pour avancer, glisser à l'écran pour regarder,
          <b>◈</b> nourrir, <b>▲</b> sauter. Choisis la nourriture dans la barre.
        </span>
      </div>
    </div>
  </div>

  <div id="unlock" class="toast hidden"></div>
  <div id="crosshair"></div>

  <div id="joystick">
    <div id="joystickThumb"></div>
  </div>
  <div id="touchButtons">
    <button id="btnJump" class="touchBtn" title="Sauter">▲</button>
    <button id="btnFeed" class="touchBtn feed" title="Nourrir">◈</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module" src="game.js"></script>
</body>
</html>
